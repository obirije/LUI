name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  kotlin-tests:
    name: Kotlin Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download sherpa-onnx AAR
        run: |
          mkdir -p app/libs
          curl -sL "https://github.com/obirije/LUI/releases/download/v0.2.0-alpha/sherpa-onnx.aar" -o app/libs/sherpa-onnx.aar

      - name: Run unit tests
        run: ./gradlew testFullDebugUnitTest

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lui-python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[test]" pytest

      - name: Run tests
        run: pytest tests/ -v
